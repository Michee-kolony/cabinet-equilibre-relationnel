<div class="min-h-screen bg-gray-50 py-32 px-4 flex justify-center">

  <div class="max-w-4xl w-full bg-white rounded-2xl shadow-lg overflow-hidden">

    <!-- IMAGE -->
    <div class="w-full h-[300px] md:h-[400px] overflow-hidden">
      <img [src]="article?.image"
           class="w-full h-full object-cover">
    </div>

    <!-- CONTENU -->
    <div class="p-6 md:p-10">

      <!-- DATE -->
      <p class="text-sm text-gray-400 mb-2">
        {{ getTimeAgo(article?.date) }}
      </p>

      <!-- TITRE -->
      <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-3">
        {{ article?.titre }}
      </h1>

      <!-- SOUS-TITRE -->
      <h2 class="text-lg text-gray-600 mb-6">
        {{ article?.soustitre }}
      </h2>

      <!-- DESCRIPTION -->
      <p class="text-gray-700 leading-relaxed whitespace-pre-line mb-8" [innerHTML]="article?.description">
      </p>

      <!-- PARTAGE -->
      <div class="flex items-center gap-4 border-t pt-6">

        <span class="text-gray-500 text-sm">Partager :</span>

        <!-- FACEBOOK -->
        <a *ngIf="article?.facebook"
           [href]="article.facebook"
           target="_blank"
           class="w-10 h-10 text-decoration-none flex items-center justify-center rounded-full bg-blue-600 text-white hover:scale-110 transition">
          <i class="fab fa-facebook-f"></i>
        </a>

        <!-- TWITTER -->
        <a *ngIf="article?.twitter"
           [href]="article.twitter"
           target="_blank"
           class="w-10 h-10 text-decoration-none flex items-center justify-center rounded-full bg-sky-500 text-white hover:scale-110 transition">
          <i class="fab fa-twitter"></i>
        </a>

        <!-- TIKTOK -->
        <a *ngIf="article?.tiktok"
           [href]="article.tiktok"
           target="_blank"
           class="w-10 h-10 text-decoration-none flex items-center justify-center rounded-full bg-black text-white hover:scale-110 transition">
          <i class="fab fa-tiktok"></i>
        </a>

      </div>

    </div>

  </div>

</div>
