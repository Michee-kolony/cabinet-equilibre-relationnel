<!-- Overlay avec flou sur toute la page -->
<div *ngIf="showModal" class="fixed inset-0 z-40 bg-black/30 backdrop-blur-sm"></div>

<!-- Bandeau cookies en bas full-width -->
<div 
  *ngIf="showModal"
  class="fixed bottom-0 left-0 z-50 w-full"
>
  <div class="bg-white w-full shadow-lg p-6 flex flex-col md:flex-row items-center justify-between gap-4 animate-slide-up">
    <!-- Texte -->
    <p class="text-gray-800 text-center md:text-left flex-1">
      Nous utilisons des cookies pour améliorer votre expérience sur notre site. 
      Acceptez-vous l'utilisation des cookies ?
    </p>

    <!-- Boutons -->
    <div class="flex justify-center gap-4">
      <button 
        (click)="acceptCookies()"
        class="bg-white text-black px-6 py-2 rounded border transition"
      >
        Accepter
      </button>
      <button 
        (click)="declineCookies()"
        class="bg-[#F04DE1] text-white px-6 py-2 rounded hover:bg-red-600 transition"
      >
        Refuser
      </button>
    </div>
  </div>
</div>
