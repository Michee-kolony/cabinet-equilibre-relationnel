<div class="p-6 min-h-screen">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Gestion des actualités</h1>

    <button (click)="openModal()"
      class="bg-[#F04DE1] text-white px-5 py-2 rounded-xl shadow hover:opacity-90">
      Publier
    </button>
  </div>

  <!-- LISTE ACTUALITES -->
  <div class="grid md:grid-cols-3 gap-6">

    <div *ngFor="let act of actualites"
         class="bg-white rounded-2xl shadow-md overflow-hidden">

      <img [src]="act.image" class="w-full h-40 object-cover">

      <div class="p-4">
        <h2 class="font-bold text-lg text-gray-800">{{ act.titre }}</h2>
        <p class="text-gray-500 text-sm mb-2">{{ act.soustitre }}</p>

        <p class="text-xs text-gray-400 mb-3">
          {{ formatDate(act.date) }}
        </p>

        <div class="flex gap-2">

          <!-- MODIFIER -->
          <button
            (click)="editActualite(act)" 
            class="bg-green-500 text-white px-3 py-2 rounded-lg text-sm hover:opacity-90">
            Modifier
          </button>

          <!-- SUPPRIMER -->
          <button
            (click)="deleteActualite(act._id)" 
            class="bg-red-500 text-white px-3 py-2 rounded-lg text-sm hover:opacity-90">
            Supprimer
          </button>

        </div>
      </div>
    </div>

  </div>

</div>


<!-- MODALE -->
<div *ngIf="showModal" 
     class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-lg">

    <h2 class="text-xl font-bold mb-4 text-gray-800">
      {{ isEdit ? 'Modifier une actualité' : 'Publier une actualité' }}
    </h2>

    <form (ngSubmit)="isEdit ? updateActualite() : publieractu()">

      <input type="text" [(ngModel)]="titre" name="titre"
             placeholder="Titre"
             class="w-full mb-3 p-2 border rounded-lg" required>

      <input type="text" [(ngModel)]="soustitre" name="soustitre"
             placeholder="Sous-titre"
             class="w-full mb-3 p-2 border rounded-lg" required>

      <textarea [(ngModel)]="description" name="description"
                placeholder="Description"
                class="w-full mb-3 p-2 border rounded-lg" required></textarea>

      <input type="text" [(ngModel)]="image" name="image"
             placeholder="URL de l'image"
             class="w-full mb-3 p-2 border rounded-lg" required>

      <input type="text" [(ngModel)]="facebook" name="facebook"
             placeholder="Facebook"
             class="w-full mb-3 p-2 border rounded-lg">

      <input type="text" [(ngModel)]="twitter" name="twitter"
             placeholder="Twitter"
             class="w-full mb-3 p-2 border rounded-lg">

      <input type="text" [(ngModel)]="tiktok" name="tiktok"
             placeholder="TikTok"
             class="w-full mb-4 p-2 border rounded-lg">

      <div class="flex justify-end gap-3">
        <button type="button" (click)="closeModal()"
                class="px-4 py-2 bg-gray-300 rounded-lg hover:opacity-90">
          Annuler
        </button>

        <button type="submit"
                class="px-4 py-2 bg-[#F04DE1] text-white rounded-lg hover:opacity-90">
          {{ isEdit ? 'Modifier' : 'Publier' }}
        </button>
      </div>
    </form>

  </div>
</div>


<!-- LOADING -->
<div *ngIf="loading" class="fixed bg-white/60 top-0 left-0 bottom-0 right-0 z-50 flex justify-center items-center">
  <div class="spinner-border text-[#F04DE1]" role="status"></div>
</div>
