<div class="min-h-screen flex relative overflow-hidden">
  <!-- SVG Waves Background pour la colonne gauche -->
  <div class="absolute left-0 top-0 w-full md:w-2/4 h-full pointer-events-none">
    <svg class="absolute bottom-0 left-0 w-full" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
      <path fill="#F04DE1" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,170.7C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path>
    </svg>
    <svg class="absolute top-0 right-0 w-64 h-64" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <path fill="#F04DE1" fill-opacity="0.05" d="M45,-70.7C58.1,-63.5,68.3,-51.4,75.7,-37.6C83.1,-23.8,87.7,-8.3,86.6,7C85.5,22.3,78.7,37.4,67.9,48.6C57.1,59.8,42.3,67.1,26.9,71.5C11.5,75.9,-4.5,77.4,-19.8,73.5C-35.1,69.6,-49.8,60.3,-61.7,48C-73.6,35.7,-82.8,20.4,-86.1,3.3C-89.4,-13.8,-86.8,-32.7,-77.1,-47.1C-67.4,-61.5,-50.5,-71.5,-33.3,-76.7C-16.1,-81.9,1.3,-82.3,18.4,-77.5C35.5,-72.7,52.3,-62.8,45,-70.7Z" transform="translate(100 100)"></path>
    </svg>
    <svg class="absolute bottom-20 left-10 w-32 h-32" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <path fill="#F04DE1" fill-opacity="0.05" d="M37.9,-60.9C49.4,-54.3,59.6,-44.2,66.1,-32.1C72.6,-20,75.4,-5.9,72.7,7.3C70,20.5,61.8,32.8,51.1,42.2C40.4,51.6,27.2,58.1,12.7,62.3C-1.8,66.5,-17.7,68.4,-31.6,63.6C-45.5,58.8,-57.4,47.3,-65.1,33.3C-72.8,19.3,-76.3,2.8,-73.1,-12.3C-69.9,-27.4,-60,-41.1,-47.2,-49.7C-34.4,-58.3,-18.7,-61.8,-2.9,-60.7C12.9,-59.6,25.8,-53.9,37.9,-60.9Z" transform="translate(100 100)"></path>
    </svg>
  </div>

  <!-- Colonne gauche (formulaire) -->
  <div class="relative z-10 w-full md:w-2/4 bg-white/80 backdrop-blur-sm flex items-center justify-center p-8 shadow-2xl">
    <div class="w-full max-w-md">
      <!-- Logo avec animation -->
      <div class="relative mb-8">
        <div class="absolute inset-0 bg-gradient-to-r from-[#F04DE1] to-red-500 rounded-full blur-xl opacity-20 animate-pulse"></div>
        <img src="images/WhatsApp Image 2026-02-26 at 15.24.01-Photoroom.png" class="w-[180px] mx-auto relative z-10 drop-shadow-2xl hover:scale-105 transition-transform duration-300"/>
      </div>

      <!-- Titre avec effet -->
      <div class="text-center mb-10">
        <h2 class="text-4xl font-bold bg-gradient-to-r from-[#F04DE1] to-red-500 bg-clip-text text-transparent mb-2">
          Administrateur
        </h2>
        <div class="w-24 h-1 bg-gradient-to-r from-[#F04DE1] to-red-500 mx-auto rounded-full"></div>
      </div>

      <!-- Formulaire avec design amélioré -->
      <div class="space-y-6">
        <!-- Username -->
        <div class="group">
          <label class="block text-gray-700 text-sm font-semibold mb-2 ml-1">
            <i class="fa fa-user text-[#F04DE1] mr-2"></i>Nom d'utilisateur
          </label>
          <div class="relative">
            <input
              type="text"
              placeholder="exemple@email.com"
              class="w-full px-5 py-4 border-2 border-gray-200 rounded-xl focus:border-[#F04DE1] focus:ring-4 focus:ring-[#F04DE1]/20 transition-all duration-300 outline-none bg-white/50 backdrop-blur-sm"
            />
            <div class="absolute inset-0 rounded-xl bg-gradient-to-r from-[#F04DE1] to-red-500 opacity-0 group-hover:opacity-10 transition-opacity duration-300 pointer-events-none"></div>
          </div>
        </div>

        <!-- Password avec amélioration -->
        <div class="group relative">
          <label class="block text-gray-700 text-sm font-semibold mb-2 ml-1">
            <i class="fa fa-lock text-[#F04DE1] mr-2"></i>Mot de passe
          </label>
          <div class="relative">
            <input
              [type]="showPassword ? 'text' : 'password'"
              placeholder="••••••••"
              class="w-full px-5 py-4 border-2 border-gray-200 rounded-xl focus:border-[#F04DE1] focus:ring-4 focus:ring-[#F04DE1]/20 transition-all duration-300 outline-none pr-12 bg-white/50 backdrop-blur-sm"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 p-2 hover:bg-gray-100 rounded-lg transition-colors"
            >
              <i
                class="fa text-gray-500 text-lg"
                [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"
              ></i>
            </button>
          </div>
        </div>

        <!-- Options supplémentaires -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center space-x-2 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 accent-[#F04DE1] rounded border-gray-300"/>
            <span class="text-gray-600">Se souvenir de moi</span>
          </label>
          <a href="#" class="text-[#F04DE1] hover:text-red-500 font-medium transition-colors">
            Mot de passe oublié?
          </a>
        </div>

        <!-- Bouton de connexion amélioré -->
        <button
          class="relative w-full bg-gradient-to-r from-[#F04DE1] to-red-500 text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-[#F04DE1]/30 hover:shadow-xl hover:shadow-[#F04DE1]/40 transform hover:-translate-y-0.5 transition-all duration-300 overflow-hidden group"
        >
          <span class="relative z-10 flex items-center justify-center">
            <i class="fa fa-sign-in-alt mr-2"></i>
            Se connecter
          </span>
          <div class="absolute inset-0 bg-gradient-to-r from-red-500 to-[#F04DE1] opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
        </button>

        <!-- Séparateur élégant -->
        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-4 bg-white/80 text-gray-500">Accès sécurisé</span>
          </div>
        </div>

        <!-- Info supplémentaire -->
        <p class="text-center text-gray-500 text-sm">
          <i class="fa fa-shield-alt text-[#F04DE1] mr-1"></i>
          Connexion réservée aux administrateurs
        </p>
      </div>
    </div>
  </div>

  <!-- Colonne droite améliorée -->
  <div
    class="hidden md:flex md:w-3/4 items-center justify-center bg-gradient-to-br from-[#F04DE1] via-red-500 to-orange-500 relative overflow-hidden"
  >
    <!-- SVG Waves pour la colonne droite -->
    <svg class="absolute bottom-0 left-0 w-full" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
      <path fill="#ffffff" fill-opacity="0.1" d="M0,64L34.3,74.7C68.6,85,137,107,206,122.7C274.3,139,343,149,411,138.7C480,128,549,96,617,106.7C685.7,117,754,171,823,186.7C891.4,203,960,181,1029,154.7C1097.1,128,1166,96,1234,101.3C1302.9,107,1371,149,1406,170.7L1440,192L1440,320L1405.7,320C1371.4,320,1303,320,1234,320C1165.7,320,1097,320,1029,320C960,320,891,320,823,320C754.3,320,686,320,617,320C548.6,320,480,320,411,320C342.9,320,274,320,206,320C137.1,320,69,320,34,320L0,320Z"></path>
    </svg>
    
    <svg class="absolute top-0 right-0 w-96 h-96" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <path fill="#ffffff" fill-opacity="0.05" d="M45,-70.7C58.1,-63.5,68.3,-51.4,75.7,-37.6C83.1,-23.8,87.7,-8.3,86.6,7C85.5,22.3,78.7,37.4,67.9,48.6C57.1,59.8,42.3,67.1,26.9,71.5C11.5,75.9,-4.5,77.4,-19.8,73.5C-35.1,69.6,-49.8,60.3,-61.7,48C-73.6,35.7,-82.8,20.4,-86.1,3.3C-89.4,-13.8,-86.8,-32.7,-77.1,-47.1C-67.4,-61.5,-50.5,-71.5,-33.3,-76.7C-16.1,-81.9,1.3,-82.3,18.4,-77.5C35.5,-72.7,52.3,-62.8,45,-70.7Z" transform="translate(100 100)"></path>
    </svg>

    <div class="relative z-10 text-center text-white p-12 max-w-2xl">
      <!-- Image avec overlay et effets -->
      <div class="relative mb-8 group">
        <div class="absolute -inset-1 bg-gradient-to-r from-white to-white/50 rounded-xl blur opacity-30 group-hover:opacity-50 transition duration-1000"></div>
        <img
          src="https://images.unsplash.com/photo-1556157382-97eda2d62296?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80"
          class="relative rounded-2xl shadow-2xl mx-auto max-w-lg w-full object-cover h-64 transform group-hover:scale-105 transition duration-500"
          alt="Dashboard Preview"
        />
        <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent rounded-2xl"></div>
      </div>

      <!-- Contenu textuel amélioré -->
      <h1 class="text-5xl font-bold mb-6 drop-shadow-lg animate-fade-in">
        Administration Panel
      </h1>
      
      <p class="text-xl opacity-90 mb-8 leading-relaxed">
        Accédez au tableau de bord sécurisé pour gérer votre application en toute sérénité.
      </p>

      <!-- Features mini cards -->
      <div class="grid grid-cols-3 gap-4 mt-10">
        <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 transform hover:scale-105 transition">
          <i class="fa fa-shield-alt text-2xl mb-2"></i>
          <p class="text-sm font-semibold">Sécurisé</p>
        </div>
        <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 transform hover:scale-105 transition">
          <i class="fa fa-chart-line text-2xl mb-2"></i>
          <p class="text-sm font-semibold">Analytics</p>
        </div>
        <div class="bg-white/10 backdrop-blur-sm rounded-xl p-4 transform hover:scale-105 transition">
          <i class="fa fa-cog text-2xl mb-2"></i>
          <p class="text-sm font-semibold">Contrôle</p>
        </div>
      </div>
    </div>
  </div>
</div>
