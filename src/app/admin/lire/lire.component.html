<div class="p-6 min-h-screen">

 <div *ngIf="loading" class="fixed bg-white/60 top-0 left-0 bottom-0 right-0 z-50 flex justify-center items-center">
   <div>
    <div class="spinner-border text-[#F04DE1]" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
   </div>
</div>

  <!-- CONTENU -->
  <div *ngIf="!loading && message" class="max-w-3xl mx-auto">

    <!-- CARD -->
    <div class="bg-white rounded-2xl shadow-lg p-8 space-y-6 border">

      <!-- HEADER -->
      <div class="flex items-center justify-between border-b pb-4">

        <div class="flex items-center gap-4">

          <div class="w-14 h-14 rounded-full bg-pink-500 text-white flex items-center justify-center text-xl font-bold">
            {{message.nom.charAt(0)}}
          </div>

          <div>
            <h2 class="text-xl font-bold text-gray-800">
              {{message.nom}}
            </h2>
            <p class="text-sm text-gray-500">
              {{getTimeAgo(message.date)}}
            </p>
          </div>

        </div>

      </div>

      <!-- INFOS -->
      <div class="grid md:grid-cols-2 gap-4 text-sm text-gray-600">

        <div class="bg-gray-50 p-3 rounded-lg">
          <p class="font-semibold text-gray-700">Email</p>
          <p>{{message.email}}</p>
        </div>

        <div class="bg-gray-50 p-3 rounded-lg">
          <p class="font-semibold text-gray-700">Téléphone</p>
          <p>{{message.telephone}}</p>
        </div>

      </div>

      <!-- MESSAGE -->
      <div class="bg-gray-50 p-5 rounded-xl">

        <p class="text-gray-700 leading-relaxed whitespace-pre-line">
          {{message.message}}
        </p>

      </div>

      <!-- ACTIONS -->
      <div class="flex justify-between items-center pt-4">

        <button
          routerLink="/admin/messages"
          class="text-gray-500 hover:text-gray-700 text-sm">
          ← Retour
        </button>

        <button
          (click)="supprimerMessage()"
          [disabled]="deleting"
          class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-lg text-sm flex items-center gap-2 transition disabled:opacity-50">

          <!-- SPINNER -->
          <svg *ngIf="deleting" class="animate-spin h-4 w-4"
               xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="white" stroke-width="4"></circle>
          </svg>

          {{ deleting ? 'Suppression...' : 'Supprimer' }}

        </button>

      </div>

    </div>

  </div>

  <!-- SI RIEN -->
  <div *ngIf="!loading && !message" class="text-center text-gray-500">
    Message introuvable 
  </div>

</div>
